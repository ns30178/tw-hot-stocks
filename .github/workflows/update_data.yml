name: Update Hot Stocks Data

on:
  # 1. 保留 GitHub 網頁手動觸發按鈕（具備最高豁免權，不受時間限制影響）
  workflow_dispatch:
  
  # 2. 開啟外部精準觸發通道，供外部排程工具（如 Make、Zapier、GAS）呼叫
  repository_dispatch:
    types: [trigger-update]
    
  # 【已徹底刪除內部 schedule cron 段落，不再受 GitHub 延遲與自作主張的幽靈觸發困擾】

  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'

permissions:
  contents: write

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Taipei

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yfinance pandas requests lxml html5lib beautifulsoup4 cloudscraper
        sudo apt-get update && sudo apt-get install -y libxss1

    - name: Run script
      env:
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        GITHUB_EVENT_NAME: ${{ github.event_name }}  # 將觸發類型傳遞給 Python 判斷
      run: python find_hot_stocks.py

    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add daily_hot_stocks.json history_records.csv
        git commit -m "Auto update data and append CSV" || echo "No changes to commit"
        git push
