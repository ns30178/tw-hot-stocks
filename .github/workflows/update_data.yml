name: Update Hot Stocks Data

on:
  schedule:
    - cron: '0 8 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Taipei

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yfinance pandas requests lxml html5lib urllib3

    - name: Run stock screener
      run: python find_hot_stocks.py

    - name: Verify and Push
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "action@github.com"
        
        # 1. 檢查檔案是否真的生成了
        ls -la daily_hot_stocks.json
        
        # 2. 強制重置與同步
        git fetch origin
        git pull origin main --rebase
        
        # 3. 提交
        git add daily_hot_stocks.json
        git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update stock data"
        git push origin main
