name: Update Hot Stocks Data

on:
  schedule:
    # 改為 UTC 07:45 (台灣時間 15:45)，提早排隊並避開 16:00 前後的高峰
    - cron: '45 7 * * 1-5'
  workflow_dispatch:
  push:
    # 加入 push 監聽：當這個 yml 檔案被修改時，強制喚醒並重新註冊排程器
    branches:
      - main
    paths:
      - '.github/workflows/**'

permissions:
  contents: write

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Taipei

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yfinance pandas requests lxml html5lib

    - name: Run script
      run: python find_hot_stocks.py

    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add daily_hot_stocks.json
        git commit -m "Auto update daily_hot_stocks.json" || echo "No changes to commit"
        git push
