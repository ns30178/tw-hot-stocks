name: Update Hot Stocks Data

on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:
  repository_dispatch:
    types: [trigger-update]
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'

permissions:
  contents: write

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Taipei

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yfinance pandas requests lxml html5lib beautifulsoup4 cloudscraper
        # 增加這一行，確保爬蟲依賴庫完整
        sudo apt-get update && sudo apt-get install -y libxss1

    - name: Run script
      env:
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      run: python find_hot_stocks.py

    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add daily_hot_stocks.json history_records.csv
        git commit -m "Auto update data and append CSV" || echo "No changes to commit"
        git push
