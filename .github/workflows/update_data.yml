name: Update Hot Stocks Data

on:
  schedule:
    # 改為 UTC 08:13 (台灣時間 16:13)，避開整點伺服器塞車，週一至週五執行
    - cron: '13 8 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Taipei

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yfinance pandas requests lxml html5lib

    - name: Run script
      run: python find_hot_stocks.py

    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add daily_hot_stocks.json
        git commit -m "Auto update daily_hot_stocks.json" || echo "No changes to commit"
        git push
