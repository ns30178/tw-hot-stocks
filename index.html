<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股雙策略觀測站</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-2 md:p-8">
    
    <div class="max-w-6xl mx-auto mb-6 text-center md:text-left">
        <h1 class="text-3xl font-extrabold text-gray-800">台股雙策略觀測站</h1>
        <p class="text-gray-600 mt-2" id="update-time">資料更新時間：讀取中...</p>
    </div>

    <script>
        const COLS = ['代號', '名稱', '產業', '熱度', '現價', '漲幅%', '量(張)', 'EPS', '本益比'];
        function createTableSection(title, colorClass, tbodyId) {
            document.write(`
                <div class="max-w-6xl mx-auto bg-white p-4 rounded shadow-md mb-8 border-t-4 ${colorClass}">
                    <h2 class="text-xl font-bold mb-4">${title}</h2>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-xs md:text-sm whitespace-nowrap">
                            <thead><tr class="border-b bg-gray-50 text-gray-600">
                                ${COLS.map(c => `<th class="p-2">${c}</th>`).join('')}
                            </tr></thead>
                            <tbody id="${tbodyId}"></tbody>
                        </table>
                    </div>
                </div>
            `);
        }
    </script>

    <script>
        createTableSection('飆股策略 (Original)', 'border-blue-500', 'body-original_strategy');
        createTableSection('AI 選股策略 (AI)', 'border-emerald-500', 'body-ai_strategy');
        createTableSection('核心交集標的 (Intersection)', 'border-purple-500', 'body-intersection');
    </script>

    <div class="max-w-6xl mx-auto bg-gray-800 text-white p-6 rounded shadow-md mb-8">
        <h2 class="text-xl font-bold mb-4 border-b border-gray-600 pb-2">當前選股策略定義</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <h3 class="text-lg font-semibold text-blue-300">飆股策略</h3>
                <ul class="list-disc list-inside text-gray-300 text-sm">
                    <li>收盤價 200 日內創新高</li>
                    <li>資本額 < 10 億、淨值 > 5 元</li>
                    <li>成交量 50 ~ 5000 張</li>
                </ul>
            </div>
            <div>
                <h3 class="text-lg font-semibold text-emerald-300">AI 選股策略</h3>
                <ul class="list-disc list-inside text-gray-300 text-sm">
                    <li>股本 < 50億、股價 > 10元</li>
                    <li>均線糾結轉發散、量能放大</li>
                    <li>K線實體紅K比例 > 50%</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        function renderTable(tbodyId, data) {
            const tbody = document.getElementById(tbodyId);
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" class="p-4 text-gray-400 text-center italic">無符合條件標的</td></tr>';
                return;
            }
            tbody.innerHTML = data.map(s => `
                <tr class="border-b hover:bg-gray-50">
                    <td class="p-2">${s['股票代號'] || '-'}</td>
                    <td class="p-2 font-bold text-gray-800">${s['股票名稱'] || '-'}</td>
                    <td class="p-2">${s['產業面'] || '-'}</td>
                    <td class="p-2 font-bold ${s['熱門程度'] === '極高' ? 'text-red-600' : 'text-gray-600'}">${s['熱門程度'] || '-'}</td>
                    <td class="p-2">${s['現價'] || '-'}</td>
                    <td class="p-2 ${s['單日漲跌幅(%)'] > 0 ? 'text-red-500' : 'text-green-500'}">
                        ${s['單日漲跌幅(%)'] ? (s['單日漲跌幅(%)'] > 0 ? '+' : '') + s['單日漲跌幅(%)'] + '%' : '-'}
                    </td>
                    <td class="p-2">${s['成交量(張)'] || '-'}</td>
                    <td class="p-2">${s['每股盈餘(EPS)'] || '-'}</td>
                    <td class="p-2">${s['本益比'] || '-'}</td>
                </tr>
            `).join('');
        }

        fetch('daily_hot_stocks.json?t=' + new Date().getTime())
            .then(res => res.json())
            .then(data => {
                document.getElementById('update-time').innerText = "資料更新時間：" + (data.update_time || '未知');
                renderTable('body-original_strategy', data.original_strategy);
                renderTable('body-ai_strategy', data.ai_strategy);
                renderTable('body-intersection', data.intersection);
            })
            .catch(err => { console.error(err); });
    </script>
</body>
</html>
