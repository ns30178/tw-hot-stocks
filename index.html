<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股雙策略觀測站</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4 md:p-8">
    
    <div class="max-w-6xl mx-auto mb-6">
        <h1 class="text-3xl font-extrabold text-gray-800">台股雙策略觀測站</h1>
        <p class="text-gray-600 mt-2" id="update-time">資料更新時間：讀取中...</p>
    </div>

    <div class="max-w-6xl mx-auto bg-white p-6 rounded shadow-md mb-8 border-t-4 border-blue-500">
        <h2 class="text-xl font-bold text-blue-700 mb-4">飆股策略</h2>
        <div class="overflow-x-auto">
            <table class="w-full text-left text-sm whitespace-nowrap">
                <thead>
                    <tr class="border-b bg-blue-50 text-gray-600">
                        <th class="p-2">代號</th><th class="p-2">名稱</th><th class="p-2 text-right">現價</th>
                        <th class="p-2 text-right">漲跌幅%</th><th class="p-2 text-right">成交量(張)</th>
                        <th class="p-2 text-right">EPS</th><th class="p-2 text-right">本益比</th>
                    </tr>
                </thead>
                <tbody id="body-original_strategy"></tbody>
            </table>
        </div>
    </div>

    <div class="max-w-6xl mx-auto bg-white p-6 rounded shadow-md mb-8 border-t-4 border-emerald-500">
        <h2 class="text-xl font-bold text-emerald-700 mb-4">AI 選股策略</h2>
        <div class="overflow-x-auto">
            <table class="w-full text-left text-sm whitespace-nowrap">
                <thead>
                    <tr class="border-b bg-emerald-50 text-gray-600">
                        <th class="p-2">代號</th><th class="p-2">名稱</th><th class="p-2 text-right">現價</th>
                        <th class="p-2 text-right">漲跌幅%</th><th class="p-2 text-right">成交量(張)</th>
                        <th class="p-2 text-right">EPS</th><th class="p-2 text-right">本益比</th>
                    </tr>
                </thead>
                <tbody id="body-ai_strategy"></tbody>
            </table>
        </div>
    </div>

    <div class="max-w-6xl mx-auto bg-white p-6 rounded shadow-md mb-8 border-t-4 border-purple-500">
        <h2 class="text-xl font-bold text-purple-700 mb-4">核心交集標的</h2>
        <div class="overflow-x-auto">
            <table class="w-full text-left text-sm whitespace-nowrap">
                <thead>
                    <tr class="border-b bg-purple-50 text-gray-600">
                        <th class="p-2">代號</th><th class="p-2">名稱</th><th class="p-2 text-right">現價</th>
                        <th class="p-2 text-right">漲跌幅%</th><th class="p-2 text-right">成交量(張)</th>
                        <th class="p-2 text-right">EPS</th><th class="p-2 text-right">本益比</th>
                    </tr>
                </thead>
                <tbody id="body-intersection"></tbody>
            </table>
        </div>
    </div>

    <div class="max-w-6xl mx-auto bg-gray-800 text-white p-8 rounded shadow-md mb-8">
        <h2 class="text-xl font-bold mb-6 border-b border-gray-600 pb-2">當前選股策略定義</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div>
                <h3 class="text-lg font-semibold text-blue-300 mb-2">飆股策略</h3>
                <ul class="list-disc list-inside text-gray-300 space-y-1 text-sm">
                    <li>收盤價 200 日內創新高</li>
                    <li>資本額 < 10 億、淨值 > 5 元</li>
                    <li>成交量 50 ~ 5000 張</li>
                </ul>
            </div>
            <div>
                <h3 class="text-lg font-semibold text-emerald-300 mb-2">AI 選股策略</h3>
                <ul class="list-disc list-inside text-gray-300 space-y-1 text-sm">
                    <li>股本 < 50億、股價 > 10元</li>
                    <li>均線糾結轉發散、量能放大</li>
                    <li>K線實體紅K比例 > 50%</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        function renderTable(tbodyId, data) {
            const tbody = document.getElementById(tbodyId);
            if (!tbody) return;
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="p-4 text-gray-400 text-center italic">目前無符合條件標的</td></tr>';
                return;
            }
            tbody.innerHTML = data.map(s => `
                <tr class="border-b hover:bg-gray-50">
                    <td class="p-2">${s['股票代號'] || '-'}</td>
                    <td class="p-2 font-bold">${s['股票名稱'] || '-'}</td>
                    <td class="p-2 text-right">${s['現價'] || '-'}</td>
                    <td class="p-2 text-right ${s['單日漲跌幅(%)'] > 0 ? 'text-red-500' : 'text-green-500'}">
                        ${s['單日漲跌幅(%)'] ? (s['單日漲跌幅(%)'] > 0 ? '+' : '') + s['單日漲跌幅(%)'] + '%' : '-'}
                    </td>
                    <td class="p-2 text-right">${s['成交量(張)'] || '-'}</td>
                    <td class="p-2 text-right">${s['每股盈餘(EPS)'] || '-'}</td>
                    <td class="p-2 text-right">${s['本益比'] || '-'}</td>
                </tr>
            `).join('');
        }

        const DATA_URL = 'daily_hot_stocks.json?t=' + new Date().getTime();

        fetch(DATA_URL)
            .then(res => res.json())
            .then(data => {
                document.getElementById('update-time').innerText = "資料更新時間：" + (data.update_time || '未知');
                renderTable('body-original_strategy', data.original_strategy);
                renderTable('body-ai_strategy', data.ai_strategy);
                renderTable('body-intersection', data.intersection);
            })
            .catch(err => {
                console.error(err);
                document.getElementById('update-time').innerText = "資料讀取錯誤";
            });
    </script>
</body>
</html>
