<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>台股雙策略觀測站</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-2xl font-bold mb-4">台股策略觀測站</h1>
        <div id="status" class="text-blue-600 font-bold">正在讀取資料...</div>
        <div id="data-display" class="hidden">
            <h2 class="text-lg font-bold mt-4">資料已載入</h2>
            <div id="content" class="bg-white p-4 rounded shadow mt-2"></div>
        </div>
        <pre id="debug" class="hidden mt-4 p-4 bg-red-100 text-red-800 text-xs"></pre>
    </div>

    <script>
        // 這是你的 JSON 檔案絕對路徑
        const DATA_URL = 'https://ns30178.github.io/tw-hot-stocks/daily_hot_stocks.json';

        fetch(DATA_URL + '?t=' + new Date().getTime())
            .then(res => res.text()) // 先讀取成文字
            .then(text => {
                // 如果文字開頭是 '<'，代表讀到 HTML 了，這是錯誤的
                if (text.trim().startsWith('<')) {
                    throw new Error("伺服器回傳的是 HTML 網頁而非 JSON。\n內容開頭: " + text.substring(0, 50));
                }
                const data = JSON.parse(text);
                document.getElementById('status').innerText = "資料更新時間：" + data.update_time;
                document.getElementById('data-display').classList.remove('hidden');
                document.getElementById('content').innerText = "成功載入 " + data.intersection.length + " 檔交集標的。";
            })
            .catch(err => {
                document.getElementById('status').innerText = "讀取失敗";
                const debug = document.getElementById('debug');
                debug.classList.remove('hidden');
                debug.innerText = err.message;
            });
    </script>
</body>
</html>
