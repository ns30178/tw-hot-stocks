<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>台股雙策略觀測站</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div id="status-msg" class="text-center py-10 text-gray-500">正在檢查資料狀態...</div>
    <div id="content" class="hidden max-w-6xl mx-auto">
        <h1 class="text-2xl font-bold mb-4">資料載入成功</h1>
        <div id="debug-info"></div>
    </div>

    <script>
        // 絕對路徑，確保抓取的是正確檔案
        const FILE_URL = 'daily_hot_stocks.json?t=' + new Date().getTime();

        fetch(FILE_URL)
            .then(res => res.text())
            .then(text => {
                // 如果讀到的內容開頭是 <，代表讀到 HTML 了 (通常是 404 頁面)
                if (text.trim().startsWith('<')) {
                    throw new Error("錯誤：讀取到的是 HTML 網頁，代表檔案路徑可能錯誤，或者 GitHub Pages 還沒部署好。");
                }
                const data = JSON.parse(text);
                document.getElementById('status-msg').classList.add('hidden');
                document.getElementById('content').classList.remove('hidden');
                console.log("資料正確:", data);
            })
            .catch(err => {
                document.getElementById('status-msg').innerText = "讀取失敗: " + err.message;
                console.error(err);
            });
    </script>
</body>
</html>
