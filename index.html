<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股雙策略觀測站</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-2 md:p-8">
    
    <div class="max-w-6xl mx-auto mb-6 text-center md:text-left">
        <h1 class="text-3xl font-extrabold text-gray-800">台股雙策略觀測站</h1>
        <p class="text-gray-600 mt-2" id="update-time">資料更新時間：讀取中...</p>
    </div>

    <script>
        const COLS = ['代號', '名稱', '產業', '熱度', '現價', '漲幅%', '量(張)', 'EPS', '本益比'];
        function createTableSection(title, colorClass, tbodyId) {
            document.write(`
                <div class="max-w-6xl mx-auto bg-white p-4 rounded shadow-md mb-8 border-t-4 ${colorClass}">
                    <h2 class="text-xl font-bold mb-4">${title}</h2>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-xs md:text-sm whitespace-nowrap">
                            <thead><tr class="border-b bg-gray-50 text-gray-600">
                                ${COLS.map(c => `<th class="p-2">${c}</th>`).join('')}
                            </tr></thead>
                            <tbody id="${tbodyId}"></tbody>
                        </table>
                    </div>
                </div>
            `);
        }
    </script>

    <script>
        createTableSection('飆股策略 (Original)', 'border-blue-500', 'body-original_strategy');
        createTableSection('AI 選股策略 (AI)', 'border-emerald-500', 'body-ai_strategy');
        createTableSection('核心交集標的 (Intersection)', 'border-purple-500', 'body-intersection');
    </script>

    <div class="max-w-6xl mx-auto bg-gray-800 text-white p-6 rounded shadow-md mb-8">
        <h2 class="text-xl font-bold mb-4 border-b border-gray-600 pb-2">當前選股策略定義</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 text-sm">
            <div>
                <h3 class="text-lg font-semibold text-blue-300 mb-2">飆股策略 (A區塊)</h3>
                <ul class="list-disc list-inside text-gray-300 space-y-1">
                    <li>技術面：收盤價 200 日內創新高。</li>
                    <li>量能：成交量介於 50 至 5000 張之間。</li>
                    <li>基本面：資本額小於 10 億、淨值大於 5 元。</li>
                </ul>
            </div>
            <div>
                <h3 class="text-lg font-semibold text-emerald-300 mb-2">AI 選股策略 (B區塊)</h3>
                <ul class="list-disc list-inside text-gray-300 space-y-1">
                    <li>基本面：股價 > 10 元、資本額 < 50 億。</li>
                    <li>均線：MA10/20/60 糾結 (開口 < 5%) 且突破均線。</li>
                    <li>動能：成交量 > 5 日均量 2 倍、且 ATR 波動放大。</li>
                    <li>型態：紅K實體 > 50%、上影線 < 30%。</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        function renderTable(tbodyId, data) {
            const tbody = document.getElementById(tbodyId);
            if (!tbody) return;
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" class="p-4 text-gray-400 text-center italic">目前無符合條件標的</td></tr>';
                return;
            }
            tbody.innerHTML = data.map(s => `
                <tr class="border-b hover:bg-gray-50">
                    <td class="p-2">${s['股票代號'] || '-'}</td>
                    <td class="p-2 font-bold text-gray-800">${s['股票名稱'] || '-'}</td>
                    <td class="p-2">${s['產業面'] || '-'}</td>
                    <td class="p-2 font-bold ${s['熱門程度'] === '極高' ? 'text-red-600' : 'text-gray-600'}">${s['熱門程度'] || '-'}</td>
                    <td class="p-2">${s['現價'] || '-
