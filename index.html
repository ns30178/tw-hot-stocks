<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股雙策略觀測站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 強制表格在手機上也能顯示，不會斷行錯誤 */
        table { min-width: 100%; }
        td, th { padding: 8px 4px; border-bottom: 1px solid #e5e7eb; }
    </style>
</head>
<body class="bg-gray-100 p-2 md:p-8">
    
    <div class="max-w-6xl mx-auto mb-6 text-center md:text-left">
        <h1 class="text-3xl font-extrabold text-gray-800">台股雙策略觀測站</h1>
        <p class="text-gray-600 mt-2 font-bold" id="update-time">初始化中...</p>
    </div>

    <div id="main-content" class="space-y-8">
        <div class="max-w-6xl mx-auto bg-white p-4 rounded shadow-md border-t-4 border-blue-500">
            <h2 class="text-lg font-bold mb-2">飆股策略 (Original)</h2>
            <div class="overflow-x-auto"><table class="text-left text-xs md:text-sm">
                <thead><tr class="bg-gray-50 text-gray-600">
                    <th>代號</th><th>名稱</th><th>產業</th><th>熱度</th><th>現價</th><th>漲幅%</th><th>量(張)</th><th>EPS</th><th>本益比</th>
                </tr></thead>
                <tbody id="body-original_strategy"></tbody>
            </table></div>
        </div>

        <div class="max-w-6xl mx-auto bg-white p-4 rounded shadow-md border-t-4 border-emerald-500">
            <h2 class="text-lg font-bold mb-2">AI 選股策略 (AI)</h2>
            <div class="overflow-x-auto"><table class="text-left text-xs md:text-sm">
                <thead><tr class="bg-gray-50 text-gray-600">
                    <th>代號</th><th>名稱</th><th>產業</th><th>熱度</th><th>現價</th><th>漲幅%</th><th>量(張)</th><th>EPS</th><th>本益比</th>
                </tr></thead>
                <tbody id="body-ai_strategy"></tbody>
            </table></div>
        </div>

        <div class="max-w-6xl mx-auto bg-white p-4 rounded shadow-md border-t-4 border-purple-500">
            <h2 class="text-lg font-bold mb-2">核心交集標的</h2>
            <div class="overflow-x-auto"><table class="text-left text-xs md:text-sm">
                <thead><tr class="bg-gray-50 text-gray-600">
                    <th>代號</th><th>名稱</th><th>產業</th><th>熱度</th><th>現價</th><th>漲幅%</th><th>量(張)</th><th>EPS</th><th>本益比</th>
                </tr></thead>
                <tbody id="body-intersection"></tbody>
            </table></div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto bg-gray-800 text-white p-6 rounded shadow-md mt-8">
        <h2 class="text-lg font-bold mb-4 border-b border-gray-600 pb-2">當前選股策略定義</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-xs">
            <div>
                <p class="font-bold text-blue-300">飆股策略 (A區塊)</p>
                <p>200日新高、資本額 < 10億、淨值 > 5元</p>
            </div>
            <div>
                <p class="font-bold text-emerald-300">AI 選股策略 (B區塊)</p>
                <p>股價 > 10元、均線糾結、紅K > 50%</p>
            </div>
        </div>
    </div>

    <script>
        function renderTable(tbodyId, data) {
            const tbody = document.getElementById(tbodyId);
            if (!tbody) return;
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" class="p-4 text-gray-400 text-center italic">目前無符合條件標的</td></tr>';
                return;
            }
            tbody.innerHTML = data.map(s => `
                <tr class="border-b hover:bg-gray-50">
                    <td class="p-2">${s['股票代號'] || '-'}</td>
                    <td class="p-2 font-bold">${s['股票名稱'] || '-'}</td>
                    <td class="p-2">${s['產業面'] || '-'}</td>
                    <td class="p-2 font-bold ${s['熱門程度'] === '極高' ? 'text-red-600' : 'text-gray-600'}">${s['熱門程度'] || '-'}</td>
                    <td class="p-2">${s['現價'] || '-'}</td>
                    <td class="p-2 ${s['單日漲跌幅(%)'] > 0 ? 'text-red-500' : 'text-green-500'}">
                        ${s['單日漲跌幅(%)'] ? (s['單日漲跌幅(%)'] > 0 ? '+' : '') + s['單日漲跌幅(%)'] + '%' : '-'}
                    </td>
                    <td class="p-2">${s['成交量(張)'] || '-'}</td>
                    <td class="p-2">${s['每股盈餘(EPS)'] || '-'}</td>
                    <td class="p-2">${s['本益比'] || '-'}</td>
                </tr>
            `).join('');
        }

        // 執行邏輯
        try {
            fetch('daily_hot_stocks.json?t=' + new Date().getTime())
                .then(res => res.json())
                .then(data => {
                    document.getElementById('update-time').innerText = "資料更新時間：" + (data.update_time || '未知');
                    renderTable('body-original_strategy', data.original_strategy || []);
                    renderTable('body-ai_strategy', data.ai_strategy || []);
                    renderTable('body-intersection', data.intersection || []);
                })
                .catch(err => {
                    document.getElementById('update-time').innerText = "讀取失敗，請重新整理";
                    console.error(err);
                });
        } catch(e) {
            console.error("腳本執行錯誤:", e);
        }
    </script>
</body>
</html>
