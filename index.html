<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股雙策略觀測站</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-2">

    <div class="max-w-6xl mx-auto mb-4">
        <h1 class="text-2xl font-bold text-gray-800">台股雙策略觀測站</h1>
        <p id="time-text" class="text-sm text-gray-600">載入中...</p>
    </div>

    <div class="max-w-6xl mx-auto space-y-4">
        <div class="bg-white p-3 rounded shadow border-l-4 border-blue-500">
            <h2 class="font-bold text-sm mb-2">飆股策略 (Original)</h2>
            <div class="overflow-x-auto"><table class="w-full text-left text-[10px]">
                <thead class="bg-gray-50 border-b"><tr><th>代號</th><th>名稱</th><th>產業</th><th>熱度</th><th>現價</th><th>EPS</th></tr></thead>
                <tbody id="body-orig"></tbody>
            </table></div>
        </div>
        
        <div class="bg-white p-3 rounded shadow border-l-4 border-emerald-500">
            <h2 class="font-bold text-sm mb-2">AI 選股策略 (AI)</h2>
            <div class="overflow-x-auto"><table class="w-full text-left text-[10px]">
                <thead class="bg-gray-50 border-b"><tr><th>代號</th><th>名稱</th><th>產業</th><th>熱度</th><th>現價</th><th>EPS</th></tr></thead>
                <tbody id="body-ai"></tbody>
            </table></div>
        </div>

        <div class="bg-white p-3 rounded shadow border-l-4 border-purple-500">
            <h2 class="font-bold text-sm mb-2">核心交集標的</h2>
            <div class="overflow-x-auto"><table class="w-full text-left text-[10px]">
                <thead class="bg-gray-50 border-b"><tr><th>代號</th><th>名稱</th><th>產業</th><th>熱度</th><th>現價</th><th>EPS</th></tr></thead>
                <tbody id="body-inter"></tbody>
            </table></div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto bg-gray-800 text-white p-3 rounded mt-4 text-[11px]">
        <p class="font-bold border-b border-gray-600 mb-1">策略定義</p>
        <p>飆股(A): 200日新高、資本額 < 10億、淨值 > 5元</p>
        <p>AI(B): 股價 > 10元、均線糾結、紅K > 50%</p>
    </div>

    <script>
        fetch('daily_hot_stocks.json?t=' + new Date().getTime())
        .then(res => res.json())
        .then(data => {
            document.getElementById('time-text').innerText = "更新時間：" + data.update_time;
            const fill = (id, list) => {
                const tbody = document.getElementById(id);
                tbody.innerHTML = (list || []).map(s => `<tr>
                    <td class="p-1">${s['股票代號']||''}</td><td class="p-1 font-bold">${s['股票名稱']||''}</td>
                    <td class="p-1">${s['產業面']||''}</td><td class="p-1">${s['熱門程度']||''}</td>
                    <td class="p-1">${s['現價']||''}</td><td class="p-1">${s['每股盈餘(EPS)']||''}</td>
                </tr>`).join('');
            };
            fill('body-orig', data.original_strategy);
            fill('body-ai', data.ai_strategy);
            fill('body-inter', data.intersection);
        })
        .catch(err => { document.getElementById('time-text').innerText = "讀取失敗"; });
    </script>
</body>
</html>
