<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>台股雙策略觀測站</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-2">

    <div class="max-w-6xl mx-auto mb-6">
        <h1 class="text-3xl font-extrabold text-gray-800">台股雙策略觀測站</h1>
        <p id="time-text" class="text-gray-600">載入中...</p>
    </div>

    <div class="max-w-6xl mx-auto space-y-6">
        <div class="bg-white p-4 rounded shadow border-t-4 border-blue-500">
            <h2 class="font-bold mb-2">飆股策略</h2>
            <div class="overflow-x-auto"><table class="w-full text-left text-xs">
                <thead><tr class="bg-gray-50 border-b"><th>代號</th><th>名稱</th><th>產業</th><th>熱度</th><th>現價</th><th>漲幅%</th><th>量(張)</th><th>EPS</th><th>本益比</th></tr></thead>
                <tbody id="body-orig"></tbody>
            </table></div>
        </div>
        <div class="bg-white p-4 rounded shadow border-t-4 border-emerald-500">
            <h2 class="font-bold mb-2">AI 選股策略</h2>
            <div class="overflow-x-auto"><table class="w-full text-left text-xs">
                <thead><tr class="bg-gray-50 border-b"><th>代號</th><th>名稱</th><th>產業</th><th>熱度</th><th>現價</th><th>漲幅%</th><th>量(張)</th><th>EPS</th><th>本益比</th></tr></thead>
                <tbody id="body-ai"></tbody>
            </table></div>
        </div>
        <div class="bg-white p-4 rounded shadow border-t-4 border-purple-500">
            <h2 class="font-bold mb-2">核心交集標的</h2>
            <div class="overflow-x-auto"><table class="w-full text-left text-xs">
                <thead><tr class="bg-gray-50 border-b"><th>代號</th><th>名稱</th><th>產業</th><th>熱度</th><th>現價</th><th>漲幅%</th><th>量(張)</th><th>EPS</th><th>本益比</th></tr></thead>
                <tbody id="body-inter"></tbody>
            </table></div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto bg-gray-800 text-white p-4 rounded mt-6 text-xs">
        <p>A策略: 200日新高、資本額 < 10億 | B策略: 均線糾結、量能放大</p>
    </div>

    <script>
        fetch('daily_hot_stocks.json?t=' + new Date().getTime())
        .then(res => res.json())
        .then(data => {
            document.getElementById('time-text').innerText = "更新時間：" + data.update_time;
            
            const fill = (id, list) => {
                const tbody = document.getElementById(id);
                // 確保即使資料為空也不會崩潰
                const arr = list || []; 
                tbody.innerHTML = arr.map(s => `<tr>
                    <td class="p-2">${s['股票代號']||''}</td><td class="p-2 font-bold">${s['股票名稱']||''}</td>
                    <td class="p-2">${s['產業面']||''}</td><td class="p-2">${s['熱門程度']||''}</td>
                    <td class="p-2">${s['現價']||''}</td><td class="p-2">${s['單日漲跌幅(%)']||''}</td>
                    <td class="p-2">${s['成交量(張)']||''}</td><td class="p-2">${s['每股盈餘(EPS)']||''}</td><td class="p-2">${s['本益比']||''}</td>
                </tr>`).join('');
            };

            fill('body-orig', data.original_strategy);
            fill('body-ai', data.ai_strategy);
            fill('body-inter', data.intersection);
        })
        .catch(err => {
            document.getElementById('time-text').innerText = "讀取發生錯誤";
        });
    </script>
</body>
</html>
