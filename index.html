<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股雙策略觀測站</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-6xl mx-auto mb-6">
        <h1 class="text-3xl font-extrabold text-gray-800">台股雙策略觀測站</h1>
        <div id="backend-update-time" class="text-sm font-bold text-blue-600 mt-2">狀態：準備讀取...</div>
    </div>

    <div id="loading" class="max-w-6xl mx-auto py-12 flex flex-col items-center justify-center bg-white rounded shadow-md">
        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600"></div>
        <p class="mt-4 text-gray-500">正在讀取資料，若持續轉圈請檢查行動網路...</p>
    </div>

    <div id="error-debug" class="hidden max-w-6xl mx-auto p-4 bg-red-100 text-red-700 rounded mt-4">
        <h2 class="font-bold">讀取失敗 (除錯資訊):</h2>
        <pre id="error-content" class="text-xs overflow-auto mt-2"></pre>
    </div>

    <div id="data-container" class="hidden max-w-6xl mx-auto bg-white p-6 rounded shadow-md">
        <h2 class="text-xl font-bold mb-4">資料已載入</h2>
        <div id="table-content"></div>
    </div>

    <script>
        // 強制使用相對路徑，避免網域名稱解析錯誤
        const jsonPath = 'daily_hot_stocks.json?t=' + new Date().getTime();

        fetch(jsonPath)
            .then(response => {
                if (!response.ok) throw new Error('HTTP 錯誤: ' + response.status);
                return response.text(); // 先讀取成純文字，不要直接轉 JSON
            })
            .then(text => {
                try {
                    const data = JSON.parse(text);
                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('data-container').classList.remove('hidden');
                    document.getElementById('backend-update-time').innerText = `資料更新時間：${data.update_time}`;
                    // 渲染邏輯...
                } catch (e) {
                    // 如果解析失敗，直接把讀到的內容顯示出來
                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('error-debug').classList.remove('hidden');
                    document.getElementById('error-content').innerText = "這不是 JSON 格式，內容為:\n" + text;
                }
            })
            .catch(err => {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('error-debug').classList.remove('hidden');
                document.getElementById('error-content').innerText = err.message;
            });
    </script>
</body>
</html>
