<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股雙策略觀測站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        th { cursor: pointer; user-select: none; }
        th:hover { background-color: #e5e7eb; transition: 0.2s; }
        .asc::after { content: ' ↑'; color: #4b5563; }
        .desc::after { content: ' ↓'; color: #4b5563; }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-8 relative">

    <div class="max-w-6xl mx-auto mb-6">
        <h1 class="text-3xl font-extrabold text-gray-800">台股雙策略觀測站</h1>
        <p class="text-gray-600 mt-2 font-bold" id="update-time">資料更新時間：讀取中...</p>
    </div>

    <div id="latest-section" class="max-w-6xl mx-auto mb-10">
        <h2 class="text-2xl font-bold text-gray-800 mb-4 border-l-4 border-gray-800 pl-3" id="latest-date">資料時間：今日</h2>
        <div id="latest-original"></div>
        <div id="latest-ai"></div>
        <div id="latest-intersection"></div>
    </div>

    <div id="previous-section" class="max-w-6xl mx-auto mb-10 opacity-80">
        <h2 class="text-2xl font-bold text-gray-600 mb-4 border-l-4 border-gray-400 pl-3" id="previous-date">資料時間：前次</h2>
        <div id="previous-original"></div>
        <div id="previous-ai"></div>
        <div id="previous-intersection"></div>
    </div>

    <div id="performance-board" class="max-w-6xl mx-auto mb-10">
        <div class="bg-gray-800 text-white p-4 md:p-6 rounded-lg shadow-lg">
            <h2 class="text-xl font-bold mb-4 border-l-4 border-yellow-400 pl-3">策略績效回測統計 (歷史進榜結算)</h2>
            <div id="stats-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                </div>
        </div>
    </div>

    <div id="tv-modal" class="hidden fixed inset-0 bg-black bg-opacity-75 z-50 flex justify-center items-center p-4">
        <div class="bg-gray-900 w-full max-w-5xl h-[80vh] rounded-lg shadow-2xl relative flex flex-col">
            <button onclick="closeModal()" class="absolute -top-4 -right-4 bg-red-600 text-white rounded-full w-10 h-10 text-xl font-bold border-2 border-white hover:bg-red-700 z-50">&times;</button>
            <div id="tv_chart_container" class="flex-1 w-full h-full rounded-lg overflow-hidden"></div>
        </div>
    </div>

    <script>
        // 解除乖離率與營收YoY在手機版的隱藏屬性
        const COLS = [
            { name: '代號', class: '', key: '股票代號' },
            { name: '名稱', class: '', key: '股票名稱' },
            { name: '天數', class: '', key: '進榜天數' },
            { name: '現價', class: '', key: '現價' },
            { name: '漲幅%', class: '', key: '單日漲跌幅(%)' },
            { name: '乖離率%', class: '', key: '乖離率(%)' }, 
            { name: '營收YoY', class: '', key: '營收YoY(%)' }, 
            { name: '法人(張)', class: '', key: '外資買賣(張)' },
            { name: '消息面', class: '', key: '情緒分析' }
        ];

        let sortState = {};

        function sortTable(tableId, colIndex, key) {
            const table = document.getElementById(tableId).querySelector('table');
            const tbody = table.querySelector('tbody');
            const rows = Array.from(tbody.querySelectorAll('tr'));
            if (rows.length === 0 || rows[0].innerText.includes('無符合條件')) return;

            const ths = table.querySelectorAll('th');
            ths.forEach(th => th.classList.remove('asc', 'desc'));

            sortState[tableId] = sortState[tableId] || {};
            sortState[tableId][key] = !sortState[tableId][key];
            const isAsc = sortState[tableId][key];
            ths[colIndex].classList.add(isAsc ? 'asc' : 'desc');

            rows.sort((a, b) => {
                let valA = a.children[colIndex].innerText.replace(/[%張\+]/g, '').split('\n')[0].trim();
                let valB = b.children[colIndex].innerText.replace(/[%張\+]/g, '').split('\n')[0].trim();
                
                let numA = parseFloat(valA);
                let numB = parseFloat(valB);

                if (!isNaN(numA) && !isNaN(numB)) {
                    return isAsc ? numA - numB : numB - numA;
                }
                return isAsc ? valA.localeCompare(valB) : valB.localeCompare(valA);
            });

            rows.forEach(row => tbody.appendChild(row));
        }

        function createTableHTML(title, colorClass, data, idPrefix) {
            let tbody = '';
            const tableId = `tbl-${idPrefix}`;
            
            if (!data || data.length === 0) {
                tbody = '<tr><td colspan="9" class="p-4 text-gray-400 text-center italic">無符合條件標的</td></tr>';
            } else {
                tbody = data.map(s => {
                    const isLimitUp = s['單日漲跌幅(%)'] >= 9.9;
                    const limitUpClass = isLimitUp ? 'bg-red-600 text-white font-bold' : '';
                    const upDownClass = isLimitUp ? 'text-white' : (s['單日漲跌幅(%)'] > 0 ? 'text-red-500' : 'text-green-500');
                    const symbolClick = `onclick="openModal('${s['交易所']}', '${s['股票代號']}')"`;
                    
                    const fiVal = s['外資買賣(張)'] || 0;
                    const itVal = s['投信買賣(張)'] || 0;
                    const fiClass = fiVal > 0 ? 'text-red-500' : (fiVal < 0 ? 'text-green-500' : 'text-gray-600');
                    const itClass = itVal > 0 ? 'text-red-500' : (itVal < 0 ? 'text-green-500' : 'text-gray-600');
                    const brokerLink = `https://www.wantgoo.com/stock/${s['股票代號']}/major-investors/branch-buysell`;
                    
                    let sentimentText = s['情緒分析'] || '—';
                    let sentimentClass = 'text-gray-500';
                    if(sentimentText.includes('利多')) sentimentClass = 'text-red-600 font-bold bg-red-100 px-2 py-1 rounded';
                    if(sentimentText.includes('利空')) sentimentClass = 'text-green-600 font-bold bg-green-100 px-2 py-1 rounded';

                    return `
                    <tr class="border-b hover:bg-gray-50 transition-colors">
                        <td class="p-2 cursor-pointer hover:underline ${limitUpClass}" ${symbolClick}>${s['股票代號'] || '-'}</td>
                        <td class="p-2 cursor-pointer hover:underline font-bold ${limitUpClass}" ${symbolClick}>${s['股票名稱'] || '-'}</td>
                        <td class="p-2 text-center font-bold text-blue-600">${s['進榜天數'] || 1}</td>
                        <td class="p-2 font-bold">${s['現價'] || '-'}</td>
                        <td class="p-2 font-bold ${upDownClass}">${s['單日漲跌幅(%)'] ? (s['單日漲跌幅(%)'] > 0 ? '+' : '') + s['單日漲跌幅(%)'] : '-'}</td>
                        <td class="p-2">${s['乖離率(%)'] !== null ? s['乖離率(%)'] : '-'}</td>
                        <td class="p-2">${s['營收YoY(%)'] !== null ? s['營收YoY(%)'] : '-'}</td>
                        <td class="p-2 text-sm"> 
                            <a href="${brokerLink}" target="_blank" class="hover:underline hover:text-blue-600 block" title="點擊看主力/分點">
                                外: <span class="${fiClass}">${fiVal}</span><br>
                                投: <span class="${itClass}">${itVal}</span>
                            </a>
                        </td>
                        <td class="p-2">
                            ${sentimentText === '—' 
                                ? '<span class="text-gray-400">—</span>' 
                                : `<a href="${s['新聞連結']}" target="_blank" class="${sentimentClass} hover:underline">${sentimentText}</a>`}
                        </td>
                    </tr>
                `}).join('');
            }

            const thead = COLS.map((c, i) => 
                `<th class="p-2 ${c.class} whitespace-nowrap" onclick="sortTable('${tableId}', ${i}, '${c.key}')" title="點擊排序">${c.name}</th>`
            ).join('');

            return `
                <div id="${tableId}" class="bg-white p-4 md:p-6 rounded shadow-md mb-6 border-t-4 ${colorClass}">
                    <h3 class="text-xl font-bold mb-4">${title}</h3>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm whitespace-nowrap">
                            <thead><tr class="border-b bg-gray-50 text-gray-600">${thead}</tr></thead>
                            <tbody>${tbody}</tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function renderPerformance(stats) {
            const container = document.getElementById('stats-container');
            
            // 如果沒有數據，顯示資料累積中的提示訊息
            if (!stats || Object.keys(stats).length === 0) {
                container.innerHTML = `
                    <div class="col-span-1 md:col-span-2 bg-gray-700 p-8 rounded-lg text-center border border-gray-600">
                        <p class="text-gray-300 font-bold text-lg mb-2">⏳ 系統資料累積中...</p>
                        <p class="text-gray-400 text-sm">需等待策略自動執行滿 5 日以上，方可產生勝率與報酬率等回測數據。</p>
                    </div>`;
                return;
            }

            let html = '';
            ['飆股策略', 'AI選股策略'].forEach(strategy => {
                if(stats[strategy]) {
                    html += `<div class="bg-gray-700 p-4 rounded"><h3 class="text-lg font-bold text-yellow-300 mb-2">${strategy}</h3><table class="w-full text-sm"><thead><tr class="text-gray-400 border-b border-gray-600"><th class="text-left py-1">持有區間</th><th class="text-right py-1">勝率</th><th class="text-right py-1">平均報酬</th><th class="text-right py-1">最佳標的</th></tr></thead><tbody>`;
                    
                    ['5日', '10日', '20日'].forEach(period => {
                        const d = stats[strategy][period];
                        if (d && d.count > 0) {
                            const winColor = d.win_rate >= 50 ? 'text-red-400' : 'text-green-400';
                            const retColor = d.avg_return > 0 ? 'text-red-400' : 'text-green-400';
                            html += `<tr class="border-b border-gray-600"><td class="py-2">${period}</td><td class="text-right font-bold ${winColor}">${d.win_rate}%</td><td class="text-right font-bold ${retColor}">${d.avg_return > 0 ? '+' : ''}${d.avg_return}%</td><td class="text-right text-gray-300">${d.best_stock}</td></tr>`;
                        } else {
                            html += `<tr class="border-b border-gray-600"><td class="py-2 text-gray-500">${period}</td><td class="text-right text-gray-500">—</td><td class="text-right text-gray-500">—</td><td class="text-right text-gray-500">—</td></tr>`;
                        }
                    });
                    html += `</tbody></table></div>`;
                }
            });
            container.innerHTML = html;
        }

        function openModal(exchange, code) {
            document.getElementById('tv-modal').classList.remove('hidden');
            document.getElementById('tv_chart_container').innerHTML = '';
            new TradingView.widget({
                "autosize": true,
                "symbol": `${exchange}:${code}`,
                "interval": "D",
                "timezone": "Asia/Taipei",
                "theme": "dark",
                "style": "1",
                "locale": "zh_TW",
                "enable_publishing": false,
                "hide_top_toolbar": false,
                "allow_symbol_change": false,
                "studies": ["Volume@tv-basicstudies", "Stochastic@tv-basicstudies", "MACD@tv-basicstudies"],
                "container_id": "tv_chart_container",
                "overrides": {
                    "mainSeriesProperties.candleStyle.upColor": "#f23645",
                    "mainSeriesProperties.candleStyle.borderUpColor": "#f23645",
                    "mainSeriesProperties.candleStyle.wickUpColor": "#f23645",
                    "mainSeriesProperties.candleStyle.downColor": "#089981",
                    "mainSeriesProperties.candleStyle.borderDownColor": "#089981",
                    "mainSeriesProperties.candleStyle.wickDownColor": "#089981"
                }
            });
        }

        function closeModal() {
            document.getElementById('tv-modal').classList.add('hidden');
            document.getElementById('tv_chart_container').innerHTML = '';
        }

        fetch('daily_hot_stocks.json?t=' + new Date().getTime())
            .then(res => res.json())
            .then(data => {
                document.getElementById('update-time').innerText = "資料更新時間：" + (data.update_time || '未知');
                
                // 強制渲染績效面板
                renderPerformance(data.performance_stats);

                if(data.latest_data) {
                    document.getElementById('latest-date').innerText = "資料時間：" + (data.latest_data.update_date || '未知');
                    document.getElementById('latest-original').innerHTML = createTableHTML('飆股策略', 'border-blue-500', data.latest_data.original_strategy, 'latest-a');
                    document.getElementById('latest-ai').innerHTML = createTableHTML('AI 選股策略', 'border-emerald-500', data.latest_data.ai_strategy, 'latest-b');
                    document.getElementById('latest-intersection').innerHTML = createTableHTML('核心交集標的', 'border-purple-500', data.latest_data.intersection, 'latest-c');
                }

                if(data.previous_data) {
                    document.getElementById('previous-date').innerText = "資料時間：" + (data.previous_data.update_date || '無');
                    document.getElementById('previous-original').innerHTML = createTableHTML('飆股策略', 'border-blue-300', data.previous_data.original_strategy, 'prev-a');
                    document.getElementById('previous-ai').innerHTML = createTableHTML('AI 選股策略', 'border-emerald-300', data.previous_data.ai_strategy, 'prev-b');
                    document.getElementById('previous-intersection').innerHTML = createTableHTML('核心交集標的', 'border-purple-300', data.previous_data.intersection, 'prev-c');
                }
            })
            .catch(err => { console.error('Fetch error:', err); });
    </script>
</body>
</html>
