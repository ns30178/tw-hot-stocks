<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股雙策略觀測站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
</head>
<body class="bg-gray-100 p-4 md:p-8 relative">

    <div class="max-w-6xl mx-auto mb-6">
        <h1 class="text-3xl font-extrabold text-gray-800">台股雙策略觀測站</h1>
        <p class="text-gray-600 mt-2 font-bold" id="update-time">資料更新時間：讀取中...</p>
    </div>

    <div id="latest-section" class="max-w-6xl mx-auto mb-10">
        <h2 class="text-2xl font-bold text-gray-800 mb-4 border-l-4 border-gray-800 pl-3" id="latest-date">資料時間：今日</h2>
        <div id="latest-original"></div>
        <div id="latest-ai"></div>
        <div id="latest-intersection"></div>
    </div>

    <div id="previous-section" class="max-w-6xl mx-auto mb-10 opacity-80">
        <h2 class="text-2xl font-bold text-gray-600 mb-4 border-l-4 border-gray-400 pl-3" id="previous-date">資料時間：前次</h2>
        <div id="previous-original"></div>
        <div id="previous-ai"></div>
        <div id="previous-intersection"></div>
    </div>

    <div id="tv-modal" class="hidden fixed inset-0 bg-black bg-opacity-75 z-50 flex justify-center items-center p-4">
        <div class="bg-gray-900 w-full max-w-5xl h-[80vh] rounded-lg shadow-2xl relative flex flex-col">
            <button onclick="closeModal()" class="absolute -top-4 -right-4 bg-red-600 text-white rounded-full w-10 h-10 text-xl font-bold border-2 border-white hover:bg-red-700 z-50">&times;</button>
            <div id="tv_chart_container" class="flex-1 w-full h-full rounded-lg overflow-hidden"></div>
        </div>
    </div>

    <script>
        const COLS = [
            { name: '代號', class: '' },
            { name: '名稱', class: '' },
            { name: '天數', class: '' },
            { name: '現價', class: '' },
            { name: '漲幅%', class: '' },
            { name: '乖離率%', class: 'hidden md:table-cell' },
            { name: '營收YoY', class: 'hidden md:table-cell' },
            { name: '法人買賣超', class: 'hidden md:table-cell' },
            { name: '籌碼細節', class: '' },
            { name: '消息面', class: '' }
        ];

        function createTableHTML(title, colorClass, data) {
            let tbody = '';
            if (!data || data.length === 0) {
                tbody = '<tr><td colspan="10" class="p-4 text-gray-400 text-center italic">無符合條件標的</td></tr>';
            } else {
                tbody = data.map(s => {
                    const isLimitUp = s['單日漲跌幅(%)'] >= 9.9;
                    const limitUpClass = isLimitUp ? 'bg-red-600 text-white font-bold' : '';
                    const upDownClass = isLimitUp ? 'text-white' : (s['單日漲跌幅(%)'] > 0 ? 'text-red-500' : 'text-green-500');
                    const symbolClick = `onclick="openModal('${s['交易所']}', '${s['股票代號']}')"`;
                    
                    const fiVal = s['外資買賣(張)'] || 0;
                    const itVal = s['投信買賣(張)'] || 0;
                    const fiClass = fiVal > 0 ? 'text-red-500' : (fiVal < 0 ? 'text-green-500' : 'text-gray-600');
                    const itClass = itVal > 0 ? 'text-red-500' : (itVal < 0 ? 'text-green-500' : 'text-gray-600');
                    
                    const brokerLink = `https://www.wantgoo.com/stock/${s['股票代號']}/major-investors/branch-buysell`;
                    
                    let sentimentText = s['情緒分析'] || '-';
                    let sentimentClass = 'text-gray-500';
                    if(sentimentText.includes('利多')) sentimentClass = 'text-red-600 font-bold bg-red-100 px-2 py-1 rounded';
                    if(sentimentText.includes('利空')) sentimentClass = 'text-green-600 font-bold bg-green-100 px-2 py-1 rounded';

                    return `
                    <tr class="border-b hover:bg-gray-50 transition-colors">
                        <td class="p-2 cursor-pointer hover:underline ${limitUpClass}" ${symbolClick}>${s['股票代號'] || '-'}</td>
                        <td class="p-2 cursor-pointer hover:underline font-bold ${limitUpClass}" ${symbolClick}>${s['股票名稱'] || '-'}</td>
                        <td class="p-2 text-center font-bold text-blue-600">${s['進榜天數'] || 1}</td>
                        <td class="p-2 font-bold">${s['現價'] || '-'}</td>
                        <td class="p-2 font-bold ${upDownClass}">
                            ${s['單日漲跌幅(%)'] ? (s['單日漲跌幅(%)'] > 0 ? '+' : '') + s['單日漲跌幅(%)'] : '-'}
                        </td>
                        <td class="p-2 hidden md:table-cell">${s['乖離率(%)'] !== null ? s['乖離率(%)'] : '-'}</td>
                        <td class="p-2 hidden md:table-cell">${s['營收YoY(%)'] !== null ? s['營收YoY(%)'] + '%' : '-'}</td>
                        <td class="p-2 hidden md:table-cell text-sm">
                            外資: <span class="${fiClass}">${fiVal}</span><br>
                            投信: <span class="${itClass}">${itVal}</span>
                        </td>
                        <td class="p-2">
                            <a href="${brokerLink}" target="_blank" class="bg-blue-600 text-white px-3 py-1 rounded text-xs hover:bg-blue-700 font-bold">查看主力/分點</a>
                        </td>
                        <td class="p-2">
                            <a href="${s['新聞連結']}" target="_blank" class="${sentimentClass} hover:underline">${sentimentText}</a>
                        </td>
                    </tr>
                `}).join('');
            }

            return `
                <div class="bg-white p-4 md:p-6 rounded shadow-md mb-6 border-t-4 ${colorClass}">
                    <h3 class="text-xl font-bold mb-4">${title}</h3>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm whitespace-nowrap">
                            <thead>
                                <tr class="border-b bg-gray-50 text-gray-600">
                                    ${COLS.map(c => `<th class="p-2 ${c.class}">${c.name}</th>`).join('')}
                                </tr>
                            </thead>
                            <tbody>${tbody}</tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function openModal(exchange, code) {
            document.getElementById('tv-modal').classList.remove('hidden');
            document.getElementById('tv_chart_container').innerHTML = '';
            new TradingView.widget({
                "autosize": true,
                "symbol": `${exchange}:${code}`,
                "interval": "D",
                "timezone": "Asia/Taipei",
                "theme": "dark",
                "style": "1",
                "locale": "zh_TW",
                "enable_publishing": false,
                "hide_top_toolbar": false,
                "allow_symbol_change": false,
                "studies": [
                    "Volume@tv-basicstudies",
                    "Stochastic@tv-basicstudies",
                    "MACD@tv-basicstudies"
                ],
                "container_id": "tv_chart_container",
                "overrides": {
                    "mainSeriesProperties.candleStyle.upColor": "#f23645",
                    "mainSeriesProperties.candleStyle.borderUpColor": "#f23645",
                    "mainSeriesProperties.candleStyle.wickUpColor": "#f23645",
                    "mainSeriesProperties.candleStyle.downColor": "#089981",
                    "mainSeriesProperties.candleStyle.borderDownColor": "#089981",
                    "mainSeriesProperties.candleStyle.wickDownColor": "#089981"
                }
            });
        }

        function closeModal() {
            document.getElementById('tv-modal').classList.add('hidden');
            document.getElementById('tv_chart_container').innerHTML = '';
        }

        fetch('daily_hot_stocks.json?t=' + new Date().getTime())
            .then(res => res.json())
            .then(data => {
                document.getElementById('update-time').innerText = "資料更新時間：" + (data.update_time || '未知');
                
                if(data.latest_data) {
                    document.getElementById('latest-date').innerText = "資料時間：" + (data.latest_data.update_date || '未知');
                    document.getElementById('latest-original').innerHTML = createTableHTML('飆股策略', 'border-blue-500', data.latest_data.original_strategy);
                    document.getElementById('latest-ai').innerHTML = createTableHTML('AI 選股策略', 'border-emerald-500', data.latest_data.ai_strategy);
                    document.getElementById('latest-intersection').innerHTML = createTableHTML('核心交集標的', 'border-purple-500', data.latest_data.intersection);
                }

                if(data.previous_data) {
                    document.getElementById('previous-date').innerText = "資料時間：" + (data.previous_data.update_date || '無');
                    document.getElementById('previous-original').innerHTML = createTableHTML('飆股策略', 'border-blue-300', data.previous_data.original_strategy);
                    document.getElementById('previous-ai').innerHTML = createTableHTML('AI 選股策略', 'border-emerald-300', data.previous_data.ai_strategy);
                    document.getElementById('previous-intersection').innerHTML = createTableHTML('核心交集標的', 'border-purple-300', data.previous_data.intersection);
                }
            })
            .catch(err => { console.error('Fetch error:', err); });
    </script>
</body>
</html>
