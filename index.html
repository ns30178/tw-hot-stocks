<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>除錯版</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <h1 class="text-2xl font-bold mb-4">台股觀測站</h1>
    <p id="msg" class="text-red-500">正在測試連線...</p>

    <script>
        const msg = document.getElementById('msg');
        
        // 1. 測試連線
        fetch('daily_hot_stocks.json?t=' + new Date().getTime())
        .then(res => {
            if (!res.ok) throw new Error("找不到檔案 (HTTP " + res.status + ")");
            return res.json();
        })
        .then(data => {
            msg.className = "text-green-600";
            msg.innerText = "連線成功！資料已抓到，請檢查檔案名稱是否為 daily_hot_stocks.json";
        })
        .catch(err => {
            // 這一行會直接把錯誤顯示在螢幕上，告訴我們到底是哪裡卡住
            msg.innerHTML = "❌ 錯誤: " + err.message + "<br><br>請檢查：<br>1. daily_hot_stocks.json 是否在同個資料夾？<br>2. 檔名大小寫是否完全一樣？";
            alert("錯誤訊息: " + err.message);
        });
    </script>
</body>
</html>
