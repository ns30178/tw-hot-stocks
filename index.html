<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>台股飆股觀測站</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-6xl mx-auto bg-white p-6 rounded shadow">
        <h1 class="text-xl font-bold mb-4">篩選結果</h1>
        <table class="w-full text-left">
            <thead>
                <tr class="border-b">
                    <th class="py-2">代號</th>
                    <th class="py-2">名稱</th>
                    <th class="py-2">現價</th>
                    <th class="py-2">成交量(張)</th>
                    <th class="py-2">資本額(億)</th>
                    <th class="py-2">EPS</th>
                </tr>
            </thead>
            <tbody id="body"></tbody>
        </table>
    </div>
    <script>
        // 改用最基礎的 fetch 請求方式，完全避免使用 URL 建構函數，解決 Blob URL 解析錯誤
        fetch('daily_hot_stocks.json')
            .then(r => {
                if (!r.ok) throw new Error('無法讀取資料');
                return r.json();
            })
            .then(data => {
                const body = document.getElementById('body');
                if (!data || data.length === 0) {
                    body.innerHTML = '<tr><td colspan="6" class="py-4 text-center text-gray-500">目前無符合篩選條件的標的</td></tr>';
                    return;
                }
                body.innerHTML = '';
                data.forEach(s => {
                    body.innerHTML += `<tr class="border-b">
                        <td class="py-2">${s['股票代號'] || '-'}</td>
                        <td class="py-2">${s['股票名稱'] || '-'}</td>
                        <td class="py-2">${s['現價'] || '-'}</td>
                        <td class="py-2">${s['成交量(張)'] || '-'}</td>
                        <td class="py-2">${s['資本額(億)'] || '-'}</td>
                        <td class="py-2">${s['每股盈餘(EPS)'] || '-'}</td>
                    </tr>`;
                });
            })
            .catch(err => {
                console.error(err);
                document.getElementById('body').innerHTML = '<tr><td colspan="6" class="py-4 text-center text-red-500">資料讀取失敗，請確認檔案是否存在於正確目錄</td></tr>';
            });
    </script>
</body>
</html>
