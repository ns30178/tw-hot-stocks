<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股雙策略觀測站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>.sort-active { color: #2563eb; font-weight: bold; }</style>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-6xl mx-auto mb-6 flex flex-col md:flex-row justify-between items-end">
        <div>
            <h1 class="text-3xl font-extrabold text-gray-800">台股雙策略觀測站</h1>
            <p class="text-gray-600 mt-2">自動比對原始策略與 AI 量化策略之交集標的</p>
        </div>
        <div class="text-right mt-4">
            <div id="backend-update-time" class="text-sm font-bold text-blue-600">資料更新時間：讀取中...</div>
        </div>
    </div>

    <div id="loading" class="max-w-6xl mx-auto py-12 flex flex-col items-center justify-center bg-white rounded shadow-md">
        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600"></div>
        <span class="mt-4 text-gray-500">資料讀取中...</span>
    </div>

    <div id="data-container" class="hidden">
        <div class="max-w-6xl mx-auto bg-white p-6 rounded shadow-md mb-8 border-t-4 border-blue-500">
            <h2 class="text-xl font-bold text-blue-700 mb-4">飆股策略 <span id="count-original_strategy" class="text-sm text-gray-400"></span></h2>
            <div class="overflow-x-auto"><table class="w-full text-left" id="table-original_strategy"><thead><tr class="border-b bg-blue-50 text-sm"></tr></thead><tbody id="body-original_strategy"></tbody></table></div>
        </div>
        </div>

    <script>
        // 設定 GitHub Pages 的完整絕對路徑
        const DATA_URL = 'https://ns30178.github.io/tw-hot-stocks/daily_hot_stocks.json';

        fetch(`${DATA_URL}?t=${new Date().getTime()}`)
            .then(r => {
                if (!r.ok) throw new Error('連線失敗，代碼: ' + r.status);
                return r.json();
            })
            .then(data => {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('data-container').classList.remove('hidden');
                document.getElementById('backend-update-time').innerText = `資料更新時間：${data.update_time || '未知'}`;
                // 這裡渲染你的表格...
            })
            .catch(err => {
                alert("網頁讀取錯誤: " + err.message + "\n如果是學校網路，請嘗試切換行動網路。");
            });
    </script>
</body>
</html>
