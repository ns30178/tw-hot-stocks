<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股飆股雙策略觀測站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .sort-active { color: #2563eb; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-8">
    
    <div class="max-w-6xl mx-auto mb-6 flex flex-col md:flex-row justify-between items-end">
        <div>
            <h1 class="text-3xl font-extrabold text-gray-800">台股雙策略觀測站</h1>
            <p class="text-gray-600 mt-2">自動比對原始策略與 AI 量化策略之交集標的</p>
        </div>
        <div class="text-right mt-4 md:mt-0">
            <div id="backend-update-time" class="text-sm font-bold text-blue-600">資料更新時間：讀取中...</div>
            <div id="view-time" class="text-xs text-gray-400 mt-1"></div>
        </div>
    </div>

    <div id="loading" class="max-w-6xl mx-auto py-12 flex flex-col items-center justify-center bg-white rounded shadow-md">
        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600"></div>
        <span class="mt-4 text-gray-500">資料擷取與運算中...</span>
    </div>

    <div id="data-container" class="hidden">
        
        <div class="max-w-6xl mx-auto bg-white p-6 rounded shadow-md mb-8 border-t-4 border-blue-500">
            <h2 class="text-xl font-bold text-blue-700 mb-4 flex justify-between">
                <span>飆股策略</span>
                <span id="count-original_strategy" class="text-sm font-normal text-gray-500">共 0 檔</span>
            </h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="border-b-2 border-gray-200 bg-blue-50 text-gray-600 text-sm">
                            <th class="py-3 px-2 cursor-pointer hover:bg-blue-100" onclick="sortTable('original_strategy', '股票代號', this)">代號 ↕</th>
                            <th class="py-3 px-2 cursor-pointer hover:bg-blue-100" onclick="sortTable('original_strategy', '股票名稱', this)">名稱 ↕</th>
                            <th class="py-3 px-2 cursor-pointer hover:bg-blue-100 hidden md:table-cell" onclick="sortTable('original_strategy', '產業面', this)">產業 ↕</th>
                            <th class="py-3 px-2 cursor-pointer hover:bg-blue-100 text-center" onclick="sortTable('original_strategy', '熱門程度', this)">熱門 ↕</th>
                            <th class="py-3 px-2 cursor-pointer hover:bg-blue-100 text-right" onclick="sortTable('original_strategy', '現價', this)">現價 ↕</th>
                            <th class="py-3 px-2 cursor-pointer hover:bg-blue-100 text-right" onclick="sortTable('original_strategy', '單日漲跌幅(%)', this)">漲幅% ↕</th>
                            <th class="py-3 px-2 cursor-pointer hover:bg-blue-100 text-right hidden md:table-cell" onclick="sortTable('original_strategy', '成交量(張)', this)">量(張) ↕</th>
                            <th class="py-3 px-2 cursor-pointer hover:bg-blue-100 text-right hidden md:table-cell" onclick="sortTable('original_strategy', '資本額(億)', this)">股本 ↕</th>
                            <th class="py-3 px-2 cursor-pointer hover:bg-blue-100 text-right hidden md:table-cell" onclick="sortTable('original_strategy', '每股盈餘(EPS)', this)">EPS ↕</th>
                        </tr>
                    </thead>
                    <tbody id="body-original_strategy" class="text-gray-700"></tbody>
                </table>
            </div>
        </div>

        <div class="max-w-6xl mx-auto bg-white p-6 rounded shadow-md mb-8 border-t-4 border-emerald-500">
            <h2 class="text-xl font-bold text-emerald-700 mb-4 flex justify-between">
                <span>Ai選股策略</span>
                <span id="count-ai_strategy" class="text-sm font-normal text-gray-500">共 0 檔</span>
            </h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="border-b-2 border-gray-200 bg-emerald-50 text-gray-600 text-sm">
                            <th class="py-3 px-2 cursor-pointer hover:bg-emerald-100" onclick="sortTable('ai_strategy', '股票代號', this)">代號 ↕</th>
                            <th class="py-3 px-2 cursor-pointer hover:bg-emerald-100" onclick="sortTable('ai_strategy', '股票名稱', this)">名稱 ↕</th>
                            <th class="py-3 px-2 cursor-pointer hover:bg-emerald-100 hidden md:table-cell" onclick="sortTable('ai_strategy', '產業面', this)">產業 ↕</th>
                            <th class="py-3 px-2 cursor-pointer hover:bg-emerald-100 text-center" onclick="sortTable('ai_strategy', '熱門程度', this)">熱門 ↕</th>
                            <th class="py-3 px-2 cursor-pointer hover:bg-emerald-100 text-right" onclick="sortTable('ai_strategy', '現價', this)">現價 ↕</th>
                            <th class="py-3 px-2 cursor-pointer hover:bg-emerald-100 text-right" onclick="sortTable('ai_strategy', '單日漲跌幅(%)', this)">漲幅% ↕</th>
                            <th class="py-3 px-2 cursor-pointer hover:bg-emerald-100 text-right hidden md:table-cell" onclick="sortTable('ai_strategy', '成交量(張)', this)">量(張) ↕</th>
                            <th class="py-3 px-2 cursor-pointer hover:bg-emerald-100 text-right hidden md:table-cell" onclick="sortTable('ai_strategy', '資本額(億)', this)">股本 ↕</th>
                            <th class="py-3 px-2 cursor-pointer hover:bg-emerald-100 text-right hidden md:table-cell" onclick="sortTable('ai_strategy', '每股盈餘(EPS)', this)">EPS ↕</th>
                        </tr>
                    </thead>
                    <tbody id="body-ai_strategy" class="text-gray-700"></tbody>
                </table>
            </div>
        </div>

        <div class="max-w-6xl mx-auto bg-white p-6 rounded shadow-md mb-8 border-t-4 border-purple-500">
            <h2 class="text-xl font-bold text-purple-700 mb-4 flex justify-between">
                <span>核心交集標的 (雙重確認)</span>
                <span id="count-intersection" class="text-sm font-normal text-gray-500">共 0 檔</span>
            </h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="border-b-2 border-gray-200 bg-purple-50 text-gray-600 text-sm">
                            <th class="py-3 px-2 cursor-pointer hover:bg-purple-100" onclick="sortTable('intersection', '股票代號', this)">代號 ↕</th>
                            <th class="py-3 px-2 cursor-pointer hover:bg-purple-100" onclick="sortTable('intersection', '股票名稱', this)">名稱 ↕</th>
                            <th class="py-3 px-2 cursor-pointer hover:bg-purple-100 hidden md:table-cell" onclick="sortTable('intersection', '產業面', this)">產業 ↕</th>
                            <th class="py-3 px-2 cursor-pointer hover:bg-purple-100 text-center" onclick="sortTable('intersection', '熱門程度', this)">熱門 ↕</th>
                            <th class="py-3 px-2 cursor-pointer hover:bg-purple-100 text-right" onclick="sortTable('intersection', '現價', this)">現價 ↕</th>
                            <th class="py-3 px-2 cursor-pointer hover:bg-purple-100 text-right" onclick="sortTable('intersection', '單日漲跌幅(%)', this)">漲幅% ↕</th>
                            <th class="py-3 px-2 cursor-pointer hover:bg-purple-100 text-right hidden md:table-cell" onclick="sortTable('intersection', '成交量(張)', this)">量(張) ↕</th>
                            <th class="py-3 px-2 cursor-pointer hover:bg-purple-100 text-right hidden md:table-cell" onclick="sortTable('intersection', '資本額(億)', this)">股本 ↕</th>
                        </tr>
                    </thead>
                    <tbody id="body-intersection" class="text-gray-700"></tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        // ... JavaScript 邏輯 ...
        function sortTable(tableKey, columnKey, el) {
            let state = sortStates[tableKey];
            // 更新 UI 箭頭
            const headers = el.parentElement.children;
            for(let h of headers) h.classList.remove('sort-active');
            el.classList.add('sort-active');
            
            if (state.key === columnKey) {
                state.asc = !state.asc;
            } else {
                state.key = columnKey;
                state.asc = true;
            }
            el.innerText = el.innerText.replace(/[↕▲▼]/g, '') + (state.asc ? ' ▲' : ' ▼');

            datasets[tableKey].sort((a, b) => {
                let valA = (a[columnKey] === null || a[columnKey] === undefined || a[columnKey] === '-') ? -999999 : a[columnKey];
                let valB = (b[columnKey] === null || b[columnKey] === undefined || b[columnKey] === '-') ? -999999 : b[columnKey];
                return state.asc ? (valA > valB ? 1 : -1) : (valA < valB ? 1 : -1);
            });
            renderTable(tableKey);
        }

        function renderTable(tableKey) {
            const body = document.getElementById(`body-${tableKey}`);
            const data = datasets[tableKey];
            document.getElementById(`count-${tableKey}`).innerText = `共 ${data.length} 檔`;
            body.innerHTML = '';
            
            data.forEach((s, index) => {
                const bgClass = index % 2 === 0 ? 'bg-white' : 'bg-gray-50';
                body.innerHTML += `<tr class="${bgClass} hover:bg-blue-50 border-b">
                    <td class="py-3 px-2 font-medium">${s['股票代號']}</td>
                    <td class="py-3 px-2">${s['股票名稱']}</td>
                    <td class="py-3 px-2 hidden md:table-cell">${s['產業面'] || '-'}</td>
                    <td class="py-3 px-2 text-center"><span class="${getHeatClass(s['熱門程度'])}">${s['熱門程度'] || '-'}</span></td>
                    <td class="py-3 px-2 text-right">${formatNumber(s['現價'], 2)}</td>
                    <td class="py-3 px-2 text-right">${formatPercent(s['單日漲跌幅(%)'])}</td>
                    <td class="py-3 px-2 text-right hidden md:table-cell">${formatNumber(s['成交量(張)'], 0)}</td>
                    <td class="py-3 px-2 text-right hidden md:table-cell">${formatNumber(s['資本額(億)'], 2)}</td>
                    ${tableKey !== 'intersection' ? `<td class="py-3 px-2 text-right hidden md:table-cell">${formatNumber(s['每股盈餘(EPS)'], 2)}</td>` : ''}
                </tr>`;
            });
        }
        // fetch 邏輯維持原樣...
    </script>
</body>
</html>
