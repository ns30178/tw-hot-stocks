<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股飆股觀測站</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4 md:p-8">
    
    <!-- 表格區塊 (移動至上方) -->
    <div class="max-w-6xl mx-auto bg-white p-6 rounded shadow-md mb-6">
        <div class="flex flex-col md:flex-row justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800 mb-2 md:mb-0">篩選結果</h1>
            <div class="text-right">
                <div id="backend-update-time" class="text-sm font-bold text-blue-600">資料更新時間：讀取中...</div>
                <div id="view-time" class="text-xs text-gray-400 mt-1"></div>
            </div>
        </div>

        <div id="loading" class="py-12 flex flex-col items-center justify-center">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600"></div>
            <span class="mt-4 text-gray-500">資料讀取中...</span>
        </div>

        <div id="table-container" class="hidden overflow-x-auto">
            <table class="w-full text-left whitespace-nowrap">
                <thead>
                    <tr class="border-b-2 border-gray-200 bg-gray-50 text-gray-600 text-sm">
                        <th class="py-3 px-4 cursor-pointer hover:bg-gray-200 transition-colors" onclick="sortTable('股票代號')">代號 ↕</th>
                        <th class="py-3 px-4 cursor-pointer hover:bg-gray-200 transition-colors" onclick="sortTable('股票名稱')">名稱 ↕</th>
                        <th class="py-3 px-4 cursor-pointer hover:bg-gray-200 transition-colors text-right" onclick="sortTable('現價')">現價 ↕</th>
                        <th class="py-3 px-4 cursor-pointer hover:bg-gray-200 transition-colors text-right" onclick="sortTable('單日漲跌幅(%)')">漲跌幅(%) ↕</th>
                        <th class="py-3 px-4 cursor-pointer hover:bg-gray-200 transition-colors text-right" onclick="sortTable('成交量(張)')">成交量(張) ↕</th>
                        <th class="py-3 px-4 cursor-pointer hover:bg-gray-200 transition-colors text-right" onclick="sortTable('資本額(億)')">資本額(億) ↕</th>
                        <th class="py-3 px-4 cursor-pointer hover:bg-gray-200 transition-colors text-right" onclick="sortTable('每股盈餘(EPS)')">EPS ↕</th>
                        <th class="py-3 px-4 cursor-pointer hover:bg-gray-200 transition-colors text-right" onclick="sortTable('本益比')">本益比 ↕</th>
                    </tr>
                </thead>
                <tbody id="body" class="text-gray-700"></tbody>
            </table>
        </div>
    </div>

    <!-- 策略說明區塊 (移動至下方) -->
    <div class="max-w-6xl mx-auto bg-white p-6 rounded shadow-md">
        <h2 class="text-xl font-bold text-gray-800 mb-3 border-b pb-2">當前選股策略</h2>
        <ul class="list-disc list-inside text-gray-700 space-y-1">
            <li>收盤價創新高低 -- 200日內創新高</li>
            <li>資本額 < 10 億</li>
            <li>最新淨值 > 5 元</li>
            <li>成交量張數 < 5000 張</li>
            <li>成交量張數 > 50 張</li>
        </ul>
    </div>

    <script>
        let stockData = [];
        let currentSort = { key: '', asc: true };

        function formatNumber(num, decimals = 2) {
            if (num === null || num === undefined || isNaN(num) || num === '-') return '-';
            return Number(num).toLocaleString('zh-TW', { 
                minimumFractionDigits: decimals, 
                maximumFractionDigits: decimals 
            });
        }

        function formatPercent(num) {
            if (num === null || num === undefined || isNaN(num) || num === '-') return '-';
            let colorClass = num > 0 ? 'text-red-600' : (num < 0 ? 'text-green-600' : 'text-gray-700');
            return `<span class="${colorClass} font-medium">${num > 0 ? '+' : ''}${formatNumber(num, 2)}%</span>`;
        }

        function renderTable(data) {
            const body = document.getElementById('body');
            body.innerHTML = '';
            
            if (!data || data.length === 0) {
                body.innerHTML = '<tr><td colspan="8" class="py-8 text-center text-gray-500">目前無符合篩選條件的標的</td></tr>';
                return;
            }

            data.forEach(s => {
                body.innerHTML += `<tr class="border-b hover:bg-blue-50 transition-colors">
                    <td class="py-3 px-4 font-medium text-blue-600">${s['股票代號'] || '-'}</td>
                    <td class="py-3 px-4 font-medium">${s['股票名稱'] || '-'}</td>
                    <td class="py-3 px-4 text-right">${formatNumber(s['現價'], 2)}</td>
                    <td class="py-3 px-4 text-right">${formatPercent(s['單日漲跌幅(%)'])}</td>
                    <td class="py-3 px-4 text-right">${formatNumber(s['成交量(張)'], 0)}</td>
                    <td class="py-3 px-4 text-right">${formatNumber(s['資本額(億)'], 2)}</td>
                    <td class="py-3 px-4 text-right">${formatNumber(s['每股盈餘(EPS)'], 2)}</td>
                    <td class="py-3 px-4 text-right">${formatNumber(s['本益比'], 2)}</td>
                </tr>`;
            });
        }

        function sortTable(key) {
            if (currentSort.key === key) {
                currentSort.asc = !currentSort.asc;
            } else {
                currentSort.key = key;
                currentSort.asc = true;
            }

            stockData.sort((a, b) => {
                let valA = (a[key] === null || a[key] === undefined || a[key] === '-') ? -999999 : a[key];
                let valB = (b[key] === null || b[key] === undefined || b[key] === '-') ? -999999 : b[key];

                if (typeof valA === 'string' && typeof valB === 'string') {
                    return currentSort.asc ? valA.localeCompare(valB) : valB.localeCompare(valA);
                } else {
                    return currentSort.asc ? (valA - valB) : (valB - valA);
                }
            });
            
            renderTable(stockData);
        }

        // 當前檢視時間
        const now = new Date();
        document.getElementById('view-time').innerText = `網頁載入時間：${now.getFullYear()}/${(now.getMonth()+1).toString().padStart(2, '0')}/${now.getDate().toString().padStart(2, '0')} ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;

        let jsonUrl = 'daily_hot_stocks.json';
        if (window.location.protocol === 'blob:' || window.location.href.includes('googleusercontent')) {
            jsonUrl = 'https://ns30178.github.io/tw-hot-stocks/daily_hot_stocks.json';
        }

        fetch(jsonUrl)
            .then(r => {
                if (!r.ok) throw new Error('無法讀取資料');
                return r.json();
            })
            .then(response => {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('table-container').classList.remove('hidden');
                
                // 相容新舊 JSON 結構 (陣列或物件)
                if (Array.isArray(response)) {
                    stockData = response;
                    document.getElementById('backend-update-time').innerText = '資料更新時間：未知 (舊版格式)';
                } else {
                    stockData = response.data || [];
                    document.getElementById('backend-update-time').innerText = `資料更新時間：${response.update_time || '未知'}`;
                }
                
                renderTable(stockData);
            })
            .catch(err => {
                console.error(err);
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('table-container').classList.remove('hidden');
                document.getElementById('backend-update-time').innerText = '資料更新時間：讀取失敗';
                document.getElementById('body').innerHTML = '<tr><td colspan="8" class="py-8 text-center text-red-500">資料讀取失敗，請確認檔案是否存在</td></tr>';
            });
    </script>
</body>
</html>
